[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."analyze"]
  timeout = 26

[functions."sendmail"]
  timeout = 26

# Redirige /api/* a las funciones de Netlify (mantiene las mismas URLs)
[[redirects]]
  from = "/api/analyze"
  to = "/.netlify/functions/analyze"
  status = 200

[[redirects]]
  from = "/api/sendmail"
  to = "/.netlify/functions/sendmail"
  status = 200

[[redirects]]
  from = "/api/save-recepcion"
  to = "/.netlify/functions/save-recepcion"
  status = 200

# SPA fallback: cualquier ruta desconocida sirve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
